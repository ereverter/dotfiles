font_family      JetBrainsMono Nerd Font
font_size        20.0

# persist font zoom across sessions (overrides font_size above)
include font-size.conf
map cmd+equal combine : change_font_size all +1.0 : launch --type=background ~/.config/kitty/adjust-font-size.sh +1.0
map cmd+minus combine : change_font_size all -1.0 : launch --type=background ~/.config/kitty/adjust-font-size.sh -1.0
map cmd+0 combine : change_font_size all 0 : launch --type=background sh -c 'sed -i "" "s/^font_size .*/font_size 20.0/" ~/.config/kitty/font-size.conf'

cursor_shape beam
cursor_blink_interval 0

scrollback_lines 10000
mouse_hide_wait 3.0
enable_audio_bell no

window_padding_width 4
confirm_os_window_close 0

macos_option_as_alt yes
macos_titlebar_color system

# Catppuccin Macchiato
# https://github.com/catppuccin/kitty

foreground #cad3f5
background #24273a

selection_foreground #24273a
selection_background #f4dbd6

cursor #f4dbd6
cursor_text_color #24273a

url_color #f4dbd6

active_border_color #b7bdf8
inactive_border_color #6e738d
bell_border_color #eed49f

